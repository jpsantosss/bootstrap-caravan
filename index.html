<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar bg-light navbar-expand-md fixed-top py-3 box-shadow">
    <div class="container-fluid">
      <!-- Navbar Logo -->
      <a href="index.html" class="navbar-brand">
        <img src="./img/caravan.svg" alt="Caravan">
      </a>

      <!-- Navbar Hamburguer Button -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Navbar Collapsed Itens -->
      <div class="collapse navbar-collapse" id="navbarSupportedContent">

        <!-- Navbar Items List-->
        <ul class="navbar-nav ms-auto">
          <!-- Navbar Item - Dropdown -->
          <li class="nav-item dropdown">
            <!-- Dropdown Button -->
            <a href="#" class="nav-link dropdown-toggle" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">Locais</a>
            <!-- Dropdown Items List -->
            <div class="dropdown-menu" aria-labelledby="navbarDropdown">
              <a href="local.html" class="dropdown-item">California</a>
              <a href="local.html" class="dropdown-item">Paris</a>
              <a href="local.html" class="dropdown-item">Dublin</a>
            </div>
          </li>
          <!-- Navbar Item -->
          <li class="nav-item">
            <a href="planos.html" class="nav-link">Planos</a>
          </li>
          <li class="nav-item">
            <a href="contato.html" class="nav-link">Contato</a>
          </li>
          <li class="nav-item">
            <a href="#" class="nav-link">Login</a>
          </li>
          <li class="nav-item">
            <a href="inscricao.html" class="btn btn-outline-primary ms-md-2">Inscreva-se</a>
          </li>
        </ul>
      </div>

    </div>
  </nav>

  <!-- Container Fluid (Responsive) -->
  <section class="container-fluid">
    <!-- Row -->
    <div class="row bg-dark text-light">
      <!-- Col Carousel -->
      <div class="col-7">
      </div>
      <!-- Col Form -->
      <div class="col-lg-5 p-4">
        <!-- Title and Text / Using Typography -->
        <h1 class="display-4">Realize a vigem do seu sonho</h1>
        <p class="lead">O melhor local para viajar é com a Caravan, mais de 5.000 excursões concluídas</p>
        <!-- Form -->
        <form action="">
          <!-- Input Group (Input + Button)-->
          <div class="input-group input-group-lg">
            <!-- Input -->
            <input type="email" class="form-control" placeholder="E-mail" aria-label="E-mail" aria-describedby="basic-addon2">
            <!-- Button -->
            <button type="button" class="input-group-text btn btn-primary">Inscreva-se</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="scrip.js"></script>
</body>
</html>
